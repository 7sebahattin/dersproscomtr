name: Deploy to Staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Hosting'in FTPS kontrol soketi aralıklı olarak "Timeout (control socket)"
      # veriyor (sunucu/ağ dalgalanması, kodla ilgisi yok). Bu yüzden deploy adımı
      # otomatik yeniden denenir: 1. deneme başarısız olursa 2., o da olmazsa 3.
      # denenir. Herhangi biri başarılıysa sonrakiler atlanır ve job GEÇER; ancak
      # üçü de başarısız olursa job başarısız olur. timeout 60sn'ye çıkarıldı.

      - name: FTP Deploy — 1. deneme
        id: d1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./
          server-dir: test.derspros.com.tr/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github
            **/.github/**

      - name: 2. denemeden önce bekle
        if: steps.d1.outcome == 'failure'
        run: sleep 20

      - name: FTP Deploy — 2. deneme
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./
          server-dir: test.derspros.com.tr/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github
            **/.github/**

      - name: 3. denemeden önce bekle
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 30

      - name: FTP Deploy — 3. deneme (son)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./
          server-dir: test.derspros.com.tr/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github
            **/.github/**
