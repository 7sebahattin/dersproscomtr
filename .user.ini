; === Oturum (session) guvenlik ayarlari ===
; Bu dosya tum siteye uygulanir (PHP-FPM), hicbir kod degisikligi gerektirmez.

; Cerez sadece HTTP uzerinden okunur, JavaScript ile calinamaz (XSS korumasi)
session.cookie_httponly = 1

; Cerez sadece HTTPS uzerinden gonderilir.
; NOT: test.derspros.com.tr'de SSL olmayabildiginden STAGING'de gecici olarak 0.
; Production (main) surumunde 1 kalir. Bu satiri main'e MERGE ETME.
session.cookie_secure = 0

; Baska sitelerden gelen isteklerde cerez sinirlanir (CSRF'yi zorlastirir)
session.cookie_samesite = "Lax"

; Sadece cerez tabanli oturum; URL'de session id tasinmaz
session.use_only_cookies = 1

; Saldirganin belirledigi session id'leri reddet (Session Fixation korumasi)
session.use_strict_mode = 1

; === OPcache: deploy sonrasi degisikliklerin otomatik gorunmesi ===
; Sunucu, PHP dosyalarinin degisip degismedigini her istekte kontrol etsin.
; Boylece GitHub'dan deploy ettigimizde yeni kod elle onbellek temizlemeye
; gerek kalmadan devreye girer (LiteSpeed coklu-worker sorununu cozer).
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
